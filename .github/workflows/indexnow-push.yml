name: IndexNow 链接自动推送

# 保留你原来的触发逻辑：手动触发 + 仅 urls.txt 更新触发
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - urls.txt

jobs:
  push-to-indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: IndexNow 批量推送链接
        run: |
          # 配置自己的站点、密钥、密钥文件地址
          SITE="https://weiqinzhang.top"
          KEY="3390820e68134f76bf5527810f957fd0"
          KEY_LOC="${SITE}/3390820e68134f76bf5527810f957fd0.txt"

          # 校验 urls.txt 是否存在
          if [ ! -f urls.txt ]; then
            echo "未找到 urls.txt 文件"
            exit 1
          fi

          # 逐行读取链接并提交 IndexNow
          while IFS= read -r url; do
            # 跳过空行
            [ -z "$url" ] && continue
            echo "正在推送：$url"
            curl -s "https://api.indexnow.org/indexnow?url=${url}&key=${KEY}&keyLocation=${KEY_LOC}"
            echo -e "\n"
          done < urls.txt
