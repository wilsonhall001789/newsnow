name: IndexNow 链接自动推送

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - urls.txt
      
  schedule:
    - cron: '0 */2 * * *' # 方案一：每2小时执行一次（一天共12次）

jobs:
  push-to-indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 推送 IndexNow 收录
        run: |
          # ========== 请修改这里 ==========
          SITE="https://weiqinzhang.top"
          KEY="3390820e68134f76bf5527810f957fd0"
          KEY_LOCATION="${SITE}/3390820e68134f76bf5527810f957fd0.txt"
          # =================================

          # 检查文件
          if [ ! -f urls.txt ]; then
            echo "❌ 未找到 urls.txt 文件"
            exit 1
          fi

          echo "✅ 开始批量推送链接到 IndexNow..."
          echo "===================================="

          # 逐行推送并显示结果
          while IFS= read -r url; do
            if [ -z "$url" ]; then
              continue
            fi
            
            echo "🔗 正在推送: $url"
            response=$(curl -s -w "\n%{http_code}" "https://api.indexnow.org/indexnow?url=${url}&key=${KEY}&keyLocation=${KEY_LOCATION}")
            body=$(echo "$response" | head -n -1)
            code=$(echo "$response" | tail -n 1)
            
            echo "📩 结果: $body"
            echo "✅ 状态码: $code"
            echo "------------------------------------"
          done < urls.txt

          echo "🎉 所有链接推送完成！"
